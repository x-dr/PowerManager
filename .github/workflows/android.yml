name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install fixed debug keystore
        run: |
          mkdir -p "$HOME/.android"
          base64 -d keystore/debug.keystore.base64 > "$HOME/.android/debug.keystore"
          ls -l "$HOME/.android/debug.keystore"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace --info

      - name: Prepare APK
        if: success()
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/PowerManager-debug-${{ github.run_number }}.apk
          cp app/build/outputs/apk/debug/app-debug.apk release/PowerManager-debug-latest.apk

      - name: Upload debug APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PowerManager-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload APK to GitHub Releases
        if: github.event_name != 'pull_request' && success()
        uses: ncipollo/release-action@v1
        with:
          tag: debug-latest
          name: PowerManager Debug Latest
          body: |
            自动构建的 PowerManager debug APK。

            Commit: ${{ github.sha }}
            Run: ${{ github.run_number }}
          artifacts: release/*.apk
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          prerelease: true
          makeLatest: true
